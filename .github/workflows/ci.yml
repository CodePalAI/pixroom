name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    env:
      PINPOINT_HEADROOM_AUTOSPAWN: "0"
      PINPOINT_LOG: silent
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=high
      - run: npm run docs:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - if: matrix.node == 24
        run: npm run bench:anthropic:self-test
      - if: matrix.node == 24
        run: npm run bench:qcv-quality
      - run: node bin/cli.js --help
      - run: node bin/cli.js demo
      - run: npm pack --dry-run

  platform-smoke:
    name: ${{ matrix.os }} smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    env:
      PINPOINT_HEADROOM_AUTOSPAWN: "0"
      PINPOINT_LOG: silent
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run docs:check
      - run: npm run typecheck
      - run: npm run build
      - run: node bin/cli.js --help
      - run: node bin/cli.js demo
      - run: npm pack --dry-run