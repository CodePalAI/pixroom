name: Policy or optimizer proposal
description: Propose a flow-policy capability, gateway control, or secondary optimization integration.
title: "proposal: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Operational problem
      description: Identify the concrete dataflow, security control, or request/response region and why existing behavior cannot handle it.
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Proposed contract
      description: State source/destination authority, model-visible metadata, fidelity, cache impact, reversibility, and fail-open or fail-closed behavior.
    validations:
      required: true
  - type: textarea
    id: quality
    attributes:
      label: Falsifiable gate
      description: Explain the task, security, and protocol checks that would disprove the proposal.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Existing evidence
      description: Label it unit-simulation, offline-real-transform, protocol-integration, live-controlled, or live-agentic.
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: Any confidentiality boundary fails closed; any optimization-only boundary has explicit fail-open behavior.
          required: true
        - label: Costs include retries, retrievals, continuations, and cache effects where applicable.
          required: true
        - label: The proposal does not claim novelty for upstream or prior-art components.
          required: true