name: Evidence replication
description: Submit an independent protocol, host, security, or optimizer replication with content-free receipts.
title: "replication: "
labels: [benchmark, replication]
body:
  - type: markdown
    attributes:
      value: |
        Follow `benchmarks/REPRODUCING.md`. Keep failed runs, remove credentials and private data, and attach labeled JSON receipts rather than screenshots alone.
  - type: input
    id: commit
    attributes:
      label: Pinpoint commit
      description: Full Git SHA used for the run.
    validations:
      required: true
  - type: input
    id: surface
    attributes:
      label: Evidence surface
      description: Opaque-flow protocol gate, cross-host opaque flow, result firewall, provider-wire QCV, or another named gate.
      placeholder: Opaque-flow protocol gate (no model)
    validations:
      required: true
  - type: input
    id: host_model
    attributes:
      label: Host and model, if applicable
      description: Leave blank for a no-model protocol replication. Otherwise include the exact client version and model ID.
      placeholder: Claude Code 2.1.197 / claude-haiku-4-5-20251001
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operator or organization, date, OS, CPU, Node version, and any host, model, sidecar, or region metadata relevant to this gate.
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands and configuration
      description: Include the flow-policy shape without confidential values, task filters, caps, repetitions, and relevant BENCH_* or PINPOINT_* variables. Remove secrets.
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Result summary
      description: Report destination success, denied bypasses, transcript-canary results, receipt verification, visible bytes, latency, host calls, failures, retries, and exclusions as applicable.
    validations:
      required: true
  - type: textarea
    id: receipts
    attributes:
      label: Raw receipts
      description: Drag in content-free protocol, host, preflight, canary, or benchmark JSON receipts, or link a pull request that adds them. Never attach raw event streams containing business data.
    validations:
      required: true
  - type: checkboxes
    id: integrity
    attributes:
      label: Integrity checks
      options:
        - label: I kept successful and failed runs and did not select only favorable seeds.
          required: true
        - label: I removed API keys, personal data, proprietary prompts, and real user content.
          required: true
        - label: I labeled offline estimates separately from provider-reported usage and live correctness.
          required: true
        - label: I disclosed whether this was a no-model protocol gate, first-party fixture, sanitized workload, or real production workload.
          required: true
        - label: I disclosed any relationship with CodePal or the Pinpoint maintainers.
          required: true